name: CI

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend Tests (Python)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        env:
          SCAN_REQUIRED: "false"
          ASYNC_SCAN_ENABLED: "false"
          APP_ROLE: "all"
          TRUST_X_FORWARDED_FOR: "true"
        run: pytest -q

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: backend-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Start public app
        env:
          APP_ROLE: "public"
          APP_HOST: "127.0.0.1"
          APP_PORT: "8080"
          ADMIN_BASE_URL: "http://127.0.0.1:8081"
          SCAN_REQUIRED: "false"
          ASYNC_SCAN_ENABLED: "false"
          CLAMD_HOST: "127.0.0.1"
          TRUST_X_FORWARDED_FOR: "true"
        run: |
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8080 > public.log 2>&1 &

      - name: Start admin app
        env:
          APP_ROLE: "admin"
          APP_HOST: "127.0.0.1"
          APP_PORT: "8081"
          ADMIN_BASE_URL: "http://127.0.0.1:8081"
          SCAN_REQUIRED: "false"
          ASYNC_SCAN_ENABLED: "false"
          CLAMD_HOST: "127.0.0.1"
          TRUST_X_FORWARDED_FOR: "true"
          ADMIN_LOCAL_ONLY: "false"
          ADMIN_TOKEN: "change-this-token"
        run: |
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8081 > admin.log 2>&1 &

      - name: Wait for services
        run: |
          for i in {1..30}; do
            curl -sf http://127.0.0.1:8080/api/health && break
            sleep 1
          done
          for i in {1..30}; do
            curl -sf http://127.0.0.1:8081/api/health && break
            sleep 1
          done

      - name: Run Playwright tests
        env:
          PUBLIC_BASE_URL: "http://127.0.0.1:8080"
          ADMIN_BASE_URL: "http://127.0.0.1:8081"
          ADMIN_TOKEN: "change-this-token"
        run: pnpm e2e:test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results

  docker-build-smoke:
    name: Docker Build Smoke
    runs-on: ubuntu-latest
    needs: backend-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build compose services
        run: docker compose build
